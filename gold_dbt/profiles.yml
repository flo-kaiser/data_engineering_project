gold_dbt:
  target: dev
  outputs:
    dev:
      type: duckdb
      # Synchronisiert mit dem Ingestor via Umgebungsvariable
      path: "{{ env_var('DUCKDB_PATH', 'data/gold_market.duckdb') }}"
      schema: main
    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('GCP_DATASET', 'gold_analytics') }}"
      threads: 4
      keyfile: "{{ env_var('GCP_KEYFILE_PATH', 'auth/service_account.json') }}"
      location: europe-west3
      priority: interactive
