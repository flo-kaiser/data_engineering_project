version: 2

models:
  - name: fct_market_summary
    description: "The primary analytical table for the Gold Intelligence Framework. Aggregates all key drivers."
    columns:
      - name: month
        description: "The month of observation."
        tests:
          - not_null
          - unique
      - name: avg_gold_price_usd
        description: "Average gold price in USD per ounce for the month."
        tests:
          - not_null
      - name: avg_gold_price_usd_ton
        description: "Average gold price in USD per metric ton."
      - name: total_gold_reserves_tonnes
        description: "Total global official gold reserves in metric tonnes."
      - name: avg_fx_usd_eur
        description: "Average USD/EUR exchange rate."
      - name: rolling_corr_12m
        description: "12-month rolling Pearson correlation between gold price and real rates."
      - name: gold_price_eur
        description: "Gold price converted to EUR using the average monthly exchange rate."

  - name: fct_gold_valuation_index
    description: >
      A calculated valuation index using a weighted score of macro-economic drivers.
      The score is normalized between 0 and 100, where higher values indicate 
      stronger bullish conditions for Gold based on:
      - 40% Central Bank Reserves (Accumulation trend)
      - 30% EUR Strength (Inverse USD correlation)
      - 30% Safe Haven Status (Negative correlation with 10Y Real Rates)
    columns:
      - name: month
        description: "The month of observation."
        tests:
          - not_null
          - unique
      - name: avg_gold_price_usd
        description: "Monthly average gold price (USD/oz) for reference."
        tests:
          - not_null
      - name: valuation_score
        description: "Weighted score (0-100) based on macro-economic drivers."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100

  - name: fct_gold_correlation
    description: >
      Calculates the rolling 12-month Pearson correlation between Gold Prices and 10Y Real Interest Rates.
      This model helps identify periods where gold behaves as a classic safe-haven asset (typically exhibiting high negative correlation with real rates).
    columns:
      - name: month
        description: "The month of observation."
        tests:
          - unique
          - not_null
      - name: avg_price
        description: "Monthly average gold price (USD/oz)."
        tests:
          - not_null
      - name: avg_rate
        description: "Monthly average 10Y Real Interest Rate (TIPS)."
        tests:
          - not_null
      - name: rolling_corr_12m
        description: "Rolling 12-month Pearson correlation coefficient."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: -1.01
              max_value: 1.01
              inclusive: true
              config:
                where: "rolling_corr_12m IS NOT NULL AND NOT CAST(rolling_corr_12m AS DOUBLE) = 'NaN'::DOUBLE"

  - name: fct_gold_market_drivers
    description: "Monthly aggregation of macro drivers (ETF, DXY, Yields) vs Gold Price."
    columns:
      - name: market_month
        description: "Month of observation."
        tests:
          - unique
          - not_null

  - name: fct_mining_vs_price
    description: "Yearly comparison of gold mining production volumes and average market prices."
    columns:
      - name: market_year
        description: "Year of observation."
        tests:
          - unique
          - not_null
      - name: total_mining_production_tonnes
        description: "Global production in tonnes."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
