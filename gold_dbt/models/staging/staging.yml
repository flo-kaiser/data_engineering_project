version: 2

models:
  - name: stg_gold_prices
    description: "Staged gold price data with ton conversion."
    columns:
      - name: price_date
        tests:
          - not_null
      - name: price_usd_per_oz
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: price_usd_per_ton
        description: "Standardized metric: price per metric ton."

  - name: stg_real_rates
    description: "Staged 10Y real interest rates (TIPS yields)."
    columns:
      - name: observation_date
        tests:
          - not_null
      - name: real_rate_10y
        description: "The 10-year inflation-indexed yield."
