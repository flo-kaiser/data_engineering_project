version: 2

models:
  - name: stg_gold_prices
    description: "Staged gold price data with ton conversion (World Bank)."
    columns:
      - name: price_date
        description: "Observation date."
        tests:
          - not_null
          - unique
      - name: price_usd_per_oz
        description: "Gold price in USD per Fine Ounce."
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: price_usd_per_ton
        description: "Standardized metric: price per metric ton (1t = 32150.7 oz)."

  - name: stg_real_rates
    description: "Staged 10Y real interest rates (FED Proxy)."
    columns:
      - name: observation_date
        description: "Observation date."
        tests:
          - not_null
          - unique
      - name: real_rate_10y
        description: "The 10-year benchmark interest rate."

  - name: stg_gold_reserves_api
    description: "Staged official gold reserves (IMF)."
    columns:
      - name: observation_date
        description: "Observation date."
        tests:
          - not_null
      - name: gold_reserves_tonnes
        description: "Official reserves in metric tonnes."
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

  - name: stg_fx_usd_eur_api
    description: "Staged FX rates USD per EUR (ECB)."
    columns:
      - name: observation_date
        description: "Observation date."
        tests:
          - not_null
      - name: usd_per_eur
        description: "Exchange rate: 1 EUR in USD."
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

  - name: stg_dxy
    description: "Staged US Dollar Index (DXY) closing prices."
    columns:
      - name: market_date
        description: "Observation date."
        tests:
          - not_null
          - unique

  - name: stg_etf_flows
    description: "Staged monthly Gold ETF flows in USD million."
    columns:
      - name: flow_date
        description: "Observation date (monthly)."
        tests:
          - not_null
      - name: ticker
        description: "ETF Ticker symbol."
      - name: flow_usd_mn
        description: "Net flow in million USD."

  - name: stg_gdt_demand
    description: "Staged quarterly gold demand components (Gold Demand Trends)."
    columns:
      - name: quarter_date
        description: "End of quarter date."
        tests:
          - not_null
      - name: demand_component
        description: "Sector (e.g., Jewelry, Investment)."

  - name: stg_mining_production
    description: "Staged yearly gold mining production volumes by country/region."
    columns:
      - name: production_year
        description: "Year of production."
        tests:
          - not_null
      - name: region_or_country
        description: "Name of the region or country."
      - name: production_tonnes
        description: "Volume in metric tonnes."

  - name: stg_sp500
    description: "Staged S&P 500 closing prices."
    columns:
      - name: market_date
        description: "Observation date."
        tests:
          - not_null
          - unique

  - name: stg_yield_10y
    description: "Staged 10Y Treasury Yield closing levels."
    columns:
      - name: market_date
        description: "Observation date."
        tests:
          - not_null
          - unique
