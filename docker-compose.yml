name: gold-analytics

x-airflow-common:
  &airflow-common
  build: .
  environment:
    - ENVIRONMENT=${ENVIRONMENT:-local}
    - DUCKDB_PATH=/app/gold_dbt/data/gold_market.duckdb
    - PYTHONPATH=/app
    - DBT_TARGET=${DBT_TARGET:-dev}
    - GCP_PROJECT_ID=${GCP_PROJECT_ID}
    - GCP_DATASET=${GCP_DATASET}
    - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
    - GCP_KEYFILE_PATH=/app/auth/service_account.json
    - AIRFLOW_HOME=/usr/local/airflow
    - AIRFLOW__CORE__FERNET_KEY=fS3v9_S-S3v9_S-S3v9_S-S3v9_S-S3v9_S-S3v9_M=
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_USERNAME:-admin}
  volumes:
    - .:/app
    - ./dags:/usr/local/airflow/dags:ro
    - airflow_data:/usr/local/airflow

services:
  airflow:
    container_name: gold-airflow
    <<: *airflow-common
    command: >
      bash -c "
      uv run airflow standalone"
    ports:
      - "8080:8080"

  dashboard:
    container_name: gold-dashboard
    <<: *airflow-common
    ports:
      - "8501:8501"
    command: uv run streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0

  pipeline:
    container_name: gold-pipeline
    <<: *airflow-common
    command: uv run python main.py

  dbt_docs:
    container_name: gold-dbt-docs
    <<: *airflow-common
    ports:
      - "8082:8082"
    command: >
      bash -c "
      cd gold_dbt &&
      uv run dbt docs generate &&
      uv run dbt docs serve --port 8082"

volumes:
  gold_data:
  airflow_data:
