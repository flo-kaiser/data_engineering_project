version: '3.8'

x-airflow-common:
  &airflow-common
  build: .
  environment:
    - ENVIRONMENT=${ENVIRONMENT:-local}
    - DUCKDB_PATH=/app/data/gold_market.duckdb
    - DBT_TARGET=${DBT_TARGET:-dev}
    - GCP_PROJECT_ID=${GCP_PROJECT_ID}
    - GCP_DATASET=${GCP_DATASET}
    - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
    - GCP_KEYFILE_PATH=/app/auth/service_account.json
    - AIRFLOW_HOME=/usr/local/airflow
  volumes:
    - .:/app
    - ./dags:/usr/local/airflow/dags

services:
  # Airflow Orchestrator
  airflow:
    <<: *airflow-common
    # Wir schreiben das Passwort direkt in die von standalone genutzte Datei
    command: >
      bash -c "
      mkdir -p /usr/local/airflow &&
      echo 'admin123' > /usr/local/airflow/standalone_admin_password.txt &&
      uv run airflow standalone"
    ports:
      - "8080:8080"

  # Dashboard
  dashboard:
    <<: *airflow-common
    ports:
      - "8501:8501"
    command: uv run streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0

  # Pipeline (Manual execution)
  pipeline:
    <<: *airflow-common
    command: uv run python main.py
