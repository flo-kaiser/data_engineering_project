version: '3.8'

services:
  # Das Dashboard (Streamlit)
  dashboard:
    build: .
    ports:
      - "8501:8501"
    environment:
      - ENVIRONMENT=local
      - DUCKDB_PATH=gold_dbt/data/gold_market.duckdb
      - DBT_TARGET=dev
    volumes:
      - .:/app
    command: uv run streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0

  # Ein optionaler Service, um die Pipeline manuell im Container zu starten
  pipeline:
    build: .
    environment:
      - ENVIRONMENT=local
      - DUCKDB_PATH=gold_dbt/data/gold_market.duckdb
      - DBT_TARGET=dev
    volumes:
      - .:/app
    # Dieses Kommando lässt den Container nach der Ingestion beenden
    command: uv run python main.py
