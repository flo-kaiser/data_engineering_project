version: '3.8'

x-airflow-common:
  &airflow-common
  build: .
  environment:
    - ENVIRONMENT=${ENVIRONMENT:-local}
    - DUCKDB_PATH=/app/data/gold_market.duckdb
    - DBT_TARGET=${DBT_TARGET:-dev}
    - GCP_PROJECT_ID=${GCP_PROJECT_ID}
    - GCP_DATASET=${GCP_DATASET}
    - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
    - GCP_KEYFILE_PATH=/app/auth/service_account.json
  volumes:
    - .:/app
    - ./dags:/usr/local/airflow/dags

services:
  # Airflow Orchestrator
  airflow:
    <<: *airflow-common
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - DUCKDB_PATH=/app/data/gold_market.duckdb
      - DBT_TARGET=${DBT_TARGET:-dev}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin123
    command: uv run airflow standalone
    ports:
      - "8080:8080"

  # Dashboard
  dashboard:
    <<: *airflow-common
    ports:
      - "8501:8501"
    command: uv run streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0

  # Pipeline (Manual execution)
  pipeline:
    <<: *airflow-common
    command: uv run python main.py
