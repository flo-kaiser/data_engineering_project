version: '3.8'

services:
  # Das Dashboard (Streamlit)
  dashboard:
    build: .
    ports:
      - "8501:8501"
    environment:
      - ENVIRONMENT=local
      - DUCKDB_PATH=/app/data/gold_market.duckdb
      - DBT_TARGET=dev
    volumes:
      - gold_data:/app/data  # Named Volume für maximale Geschwindigkeit
    command: uv run streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0

  # Die Pipeline (Ingestion & dbt)
  pipeline:
    build: .
    environment:
      - ENVIRONMENT=local
      - DUCKDB_PATH=/app/data/gold_market.duckdb
      - DBT_TARGET=dev
    volumes:
      - gold_data:/app/data  # Gleiches Volume wie Dashboard
    command: uv run python main.py

volumes:
  gold_data: # Docker verwaltet diesen Speicher intern (sehr schnell)
