version: '3.8'

x-airflow-common:
  &airflow-common
  build: .
  environment:
    - ENVIRONMENT=${ENVIRONMENT:-local}
    - DUCKDB_PATH=/app/gold_dbt/data/gold_market.duckdb
    - PYTHONPATH=/app
    - DBT_TARGET=${DBT_TARGET:-dev}
    - GCP_PROJECT_ID=${GCP_PROJECT_ID}
    - GCP_DATASET=${GCP_DATASET}
    - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
    - GCP_KEYFILE_PATH=/app/auth/service_account.json
    - AIRFLOW_HOME=/usr/local/airflow
    - AIRFLOW__CORE__FERNET_KEY=fS3v9_S-S3v9_S-S3v9_S-S3v9_S-S3v9_S-S3v9_M=
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
    # Airflow 3 Native Auth (Simple Auth Manager)
    - AIRFLOW__AUTH_MANAGER__COMMON__ADMIN_USERNAME=${AIRFLOW_USERNAME:-admin}
    - AIRFLOW__AUTH_MANAGER__COMMON__ADMIN_PASSWORD=${AIRFLOW_PASSWORD:-admin123}
  volumes:
    - .:/app
    - ./dags:/usr/local/airflow/dags
    - airflow_data:/usr/local/airflow

services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-airflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-airflow}
      - POSTGRES_DB=${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      uv run airflow db migrate &&
      uv run airflow users create -u \"${AIRFLOW_USERNAME:-admin}\" -p \"${AIRFLOW_PASSWORD:-admin123}\" -r Admin -e admin@example.com -f Admin -l User || true"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: uv run airflow api-server
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: uv run airflow scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: uv run airflow triggerer
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: uv run airflow dag-processor
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  dashboard:
    <<: *airflow-common
    ports:
      - "8501:8501"
    command: uv run streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0

  pipeline:
    <<: *airflow-common
    command: uv run python main.py

  dbt_docs:
    <<: *airflow-common
    ports:
      - "8082:8082"
    command: >
      bash -c "
      cd gold_dbt &&
      uv run dbt docs generate &&
      uv run dbt docs serve --port 8082"

volumes:
  gold_data:
  airflow_data:
  postgres_data:
